name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-elm-marketing
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 20m
          script: |
            set -e
            cd /opt/elm-marketing
            git fetch --all --prune
            git reset --hard origin/main
            docker compose up -d --build
            docker image prune -f
            docker compose ps
            # advisory health (bounded; never fails the deploy)
            curl -fsS --max-time 10 --retry 4 --retry-delay 3 --retry-connrefused http://localhost:3200/health >/dev/null \
              && echo "health OK (:3200)" \
              || echo "WARN: health check did not pass (deploy applied; check app /health)"
